name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/task-api:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/task-api:latest
#
#      - name: Deploy to Azure Container Apps
#        uses: azure/CLI@v2
#        with:
#          inlineScript: |
#            az containerapp update \
#              --name ${{ secrets.CONTAINER_APP_NAME }} \
#              --resource-group ${{ secrets.RESOURCE_GROUP }} \
#              --image ${{ secrets.ACR_LOGIN_SERVER }}/task-api:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/task-api:latest